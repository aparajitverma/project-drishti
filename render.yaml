services:
  # Backend - FastAPI
  - type: web
    name: drishti-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"

  # Frontend - React (Vite static site)
  - type: web
    name: drishti-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://drishti-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
